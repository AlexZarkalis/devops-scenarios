apiVersion: apps/v1
kind: Deployment
metadata:
  name:  spring-deployment
  namespace: default
  labels:
    app: spring
spec:
  selector:
    matchLabels:
      app: spring
  replicas: 1
  template:
    metadata:
      labels:
        app: spring
    spec:
      imagePullSecrets:
        - name: registry-credentials
      containers:
      - name: spring
        image: "{{ docker_prefix }}:{{ image_tag }}"
        livenessProbe:
          httpGet:
            path: "/actuator/health/liveness"
            port: 8080
          failureThreshold: 20
          periodSeconds: 10
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: "/actuator/health/readiness"
            port: 8080
          failureThreshold: 10
          periodSeconds: 10
          initialDelaySeconds: 30
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres:5432/{{ db.name }}?sslmode=disable"
        - name: SPRING_DATASOURCE_USERNAME
          value: "{{ db.user }}"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "{{ db.password }}"
        ports:
        - containerPort: 8080
          name: spring
