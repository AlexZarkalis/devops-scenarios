---
- name: Deploy Application with Docker Compose
  hosts: appservers
  become: yes

  tasks:
    - name: Install prerequisite packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
          - python3-docker
        state: present
        update_cache: yes

    - name: Create directory for Docker's GPG key
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker's official GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker APT repository
      apt_repository:
        repo: "deb [arch={{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else ansible_facts['architecture'] }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker

    - name: Install Docker Engine and Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is started and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add application user to the docker group
      user:
        name: "{{ appuser }}"
        groups: docker
        append: yes

    - name: "Clone the Spring repository"
      git:
        repo: "https://github.com/AlexZarkalis/realEstate.git"
        dest: "{{ appdir }}"
        version: "{{ branch }}"
        force: yes
      become_user: "{{ appuser }}"

    - name: "Template docker-compose.yaml to application directory"
      template:
        src: ../docker-compose.yaml
        dest: "{{ appdir }}/docker-compose.yaml"
        owner: "{{ appuser }}"
        group: "{{ appgroup }}"

    - name: "Deploy Docker Compose stack"
      community.docker.docker_compose_v2:
        project_src: "{{ appdir }}"
        state: present
        build: always
        pull: always
