appdir: "{{ ansible_user_dir }}/spring"
branch: "main"
appuser: "{{ansible_user_id}}"
appgroup: "{{ansible_user_gid}}"
app_port: 8080
db_server_ip: YOUR_DB_SERVER_IP  # replace with your DB server's public IP (must match hosts.yaml)
backend_server_url: "{{ db_server_ip }}:8080"
app:
  VITE_BACKEND: "{{ db_server_ip }}"
  env:
    server.port: "{{app_port}}"
    spring.datasource.username: appuser
    spring.datasource.password: apppassword  # test pass for development. in production must be stored in vault!
    spring.datasource.url: jdbc:postgresql://{{ db_server_ip }}:5432/appdb
  service:
    workingdir: "{{ ansible_user_dir }}/spring"
    execstart: "java -jar {{ ansible_user_dir }}/spring/target/real-estate-0.0.1-SNAPSHOT.jar"